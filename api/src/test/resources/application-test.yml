spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///reflect_test
    username: reflect
    password: reflect
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      repositories:
        enabled: false
  cache:
    type: none
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

sentry:
  dsn:
  enabled: false

